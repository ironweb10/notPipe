name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Set up JDK 17 (for sdkmanager)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install SDK platform 25 & build-tools 25.0.0
        run: |
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses > /dev/null 2>&1 || true
          "$SDKMANAGER" "platforms;android-25" "build-tools;25.0.0"


      - name: Set up JDK 8 (for Gradle build)
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'


      - name: Patch build files (AGP 2.3.2 → 3.1.4, Gradle 3.3 → 4.6)
        run: |
          # Root build.gradle: replace classpath and repositories
          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:3.1.4'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          task clean(type: Delete) {
              delete rootProject.buildDir
          }
          EOF

          # Gradle wrapper: bump to 4.6 (required by AGP 3.1.x)
          sed -i 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-4.6-all.zip|' \
            gradle/wrapper/gradle-wrapper.properties

          echo "=== build.gradle ===" && cat build.gradle
          echo "=== gradle-wrapper.properties ===" && cat gradle/wrapper/gradle-wrapper.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      - name: Sign APK (debug keystore)
        run: |
          if [ ! -f ~/.android/debug.keystore ]; then
            mkdir -p ~/.android
            keytool -genkeypair -v \
              -keystore ~/.android/debug.keystore \
              -alias androiddebugkey \
              -keypass android \
              -storepass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "Signing: $APK"
          $ANDROID_SDK_ROOT/build-tools/25.0.0/apksigner sign \
            --ks ~/.android/debug.keystore \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out app/build/outputs/apk/release/notPipe-signed.apk \
            "$APK"



      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: notPipe-release-apk
          path: app/build/outputs/apk/release/notPipe-signed.apk
          retention-days: 30

      - name: Get version name
        if: github.event_name == 'push'
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle | sed 's/.*"\(.*\)".*/\1/' | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-${{ github.run_number }}
          name: notPipe v${{ steps.version.outputs.version }}
          body: |
            Automatic build from commit ${{ github.sha }}

            **Target:** Android 1.5+ (API 3+)
            **compileSdk:** 25
          files: app/build/outputs/apk/release/notPipe-signed.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
